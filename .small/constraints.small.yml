small_version: "1.0.0"
owner: "human"
constraints:
  - id: "no-secrets"
    rule: "No secrets in .small artifacts"
    severity: "error"
  - id: "no-prod-writes"
    rule: "No writes to production by default"
    severity: "error"
  - id: "durable-only"
    rule: "Do not execute scheduled work without a durable run record and claim."
    severity: "error"
  - id: "no-duplicate-occurrences"
    rule: "Do not permit duplicate execution for the same occurrence_key."
    severity: "error"
  - id: "timezone-required"
    rule: "Treat schedule timezone as required, persisted state."
    severity: "error"
  - id: "scheduler-executor-separation"
    rule: "Keep scheduler/planner concerns separate from dispatcher/executor concerns."
    severity: "error"
